# Configuração do app no Fly.io para o backend FastAPI + Socket.IO.
#
# Primeira vez:
#   cd backend
#   fly launch --copy-config       # adota este fly.toml
#   fly postgres create            # ou ligue a um Postgres existente
#   fly secrets set \
#     SECRET_KEY=<gere com python -c "import secrets; print(secrets.token_hex(32))"> \
#     RPI_DEVICE_TOKEN=<token do dispositivo> \
#     ALLOWED_ORIGINS=https://<seu-app>.vercel.app
#   fly deploy
#
# Atualizações:
#   fly deploy
#
# Troque `app` por um nome único globalmente no Fly antes de subir.

app = "backend-projeto-tpe"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "Dockerfile"

# Vars públicas — segredos vão via `fly secrets set`, nunca aqui.
[env]
  ACCESS_TOKEN_EXPIRE_MINUTES = "60"
  LOG_LEVEL = "INFO"
  RPI_RATE_LIMIT_HZ = "20"

# HTTP + WebSocket no mesmo serviço (ASGI single).
[http_service]
  internal_port = 8000
  force_https = true
  # `off` é deliberado: auto_stop derruba conexões Socket.IO ativas.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# Liveness — /health não toca no DB. Pra readiness use /health/db manualmente.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

# 512MB porque matplotlib + scipy + numpy estouram 256MB facilmente.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
