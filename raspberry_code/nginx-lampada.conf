# /etc/nginx/sites-available/lampada
#
# Raspberry Pi como proxy reverso único: o Cloudflare Tunnel aponta pra cá
# (http://127.0.0.1:80) em vez de apontar direto pra ESP32. A Pi então:
#   - repassa o controle da lâmpada (/, /on, /off, /toggle, /state) pra ESP32
#   - serve as estatísticas de uso (lampada_stats.py) sob /stats
#
# Instalação: veja raspberry_code/setup_nginx_lampada.sh

upstream esp32_lampada {
    server 192.168.0.42:80;   # IP da ESP32 — troque pelo real (reserve no DHCP)
}

upstream lampada_stats {
    server 127.0.0.1:5001;   # lampada_stats.py roda na 5001 (5000 é do led-api/control_led.py)
}

server {
    listen 80 default_server;
    server_name _;

    # Controle da lâmpada — página + rotas (/on, /off, /toggle, /state)
    # servidas pela própria ESP32. Timeouts curtos: se a placa cair, o
    # visitante recebe 502 rápido em vez de ficar esperando.
    location / {
        proxy_pass http://esp32_lampada;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    # Estatísticas de uso (somente leitura) — servidas pela Pi.
    location /stats/hoje {
        proxy_pass http://lampada_stats/lampada/hoje;
        proxy_set_header Host $host;
    }

    # NÃO adicione aqui uma rota pra /lampada (ingestão de eventos da ESP32).
    # Esse POST não tem autenticação e deve continuar restrito à rede local
    # (a ESP32 já fala direto com a Pi via RASPBERRY_URL, sem passar pelo
    # túnel/nginx) — expor via internet permitiria falsificar horas de uso.
}
