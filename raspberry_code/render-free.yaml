# Render Blueprint — variante 100% free do cep_agent.
#
# Diferença para o `render.yaml` deste diretório (plano Starter/always-on
# com MQTT exposto): aqui sobe um único Web Service no plano Free, que
# dorme após ~15 min sem tráfego. Por isso:
#   - INGEST_ENABLED=false — não tenta ligar no broker MQTT (que só
#     existe na LAN da Pi; essa instância não o alcança). O ingest.py
#     continua rodando normalmente na Pi via cep-agent.service.
#   - SCHEDULER_ENABLED=false — o APScheduler interno não é confiável
#     num serviço que dorme (não dispara às 03:00 se estiver dormindo).
#     Em vez disso, o workflow .github/workflows/cep-agent-cron.yml
#     acorda o serviço via HTTP (POST /run/diario e /run/mensal) nos
#     horários certos — grátis, via GitHub Actions.
#
# Importe em https://dashboard.render.com/blueprints (New > Blueprint),
# apontando para este repositório, com o caminho do blueprint definido
# como `raspberry_code/render-free.yaml` em "Advanced".
services:
  - type: web
    name: tpe-cep-agent
    runtime: docker
    dockerfilePath: raspberry_code/cep_agent/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # URL pública do tpe-backend (o outro serviço Render).
      # Ex.: https://tpe-backend.onrender.com
      - key: BACKEND_URL
        sync: false
      # Mesmo token configurado como RPI_DEVICE_TOKEN no tpe-backend.
      - key: RPI_DEVICE_TOKEN
        sync: false
      - key: INGEST_ENABLED
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: CANAL
        value: default
      - key: TZ
        value: America/Sao_Paulo
