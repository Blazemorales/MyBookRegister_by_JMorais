<svg viewBox="0 0 940 730" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- fundo -->
  <rect x="0" y="0" width="940" height="730" fill="#f8fafc"/>
  <rect x="8" y="8" width="924" height="714" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- titulo -->
  <text x="470" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Circuito completo — Lâmpada DC 12V via MQTT</text>
  <text x="470" y="60" text-anchor="middle" font-size="13" fill="#475569">ESP32-S3-N16R8 → PC817 (opto) → IRF540N (MOSFET, low-side) — alimentado pela Raspberry Pi</text>

  <!-- ===================== TRILHOS ===================== -->
  <!-- trilho +12V -->
  <line x1="500" y1="95" x2="880" y2="95" stroke="#dc2626" stroke-width="3"/>
  <text x="500" y="88" font-size="13" font-weight="700" fill="#dc2626">+12V</text>
  <!-- trilho GND -->
  <line x1="70" y1="590" x2="880" y2="590" stroke="#0f172a" stroke-width="3"/>

  <!-- simbolo de GND comum -->
  <line x1="300" y1="590" x2="300" y2="604" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="286" y1="604" x2="314" y2="604" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="291" y1="610" x2="309" y2="610" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="295" y1="616" x2="305" y2="616" stroke="#0f172a" stroke-width="2.5"/>
  <text x="322" y="610" font-size="12" font-weight="700" fill="#0f172a">GND comum</text>

  <!-- ===================== RASPBERRY PI ===================== -->
  <rect x="70" y="150" width="190" height="120" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="165" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Raspberry Pi 3B</text>
  <text x="165" y="200" text-anchor="middle" font-size="11" fill="#475569">Broker MQTT (mosquitto)</text>
  <text x="165" y="216" text-anchor="middle" font-size="11" fill="#475569">Alimenta a ESP32 (USB)</text>
  <text x="150" y="262" text-anchor="middle" font-size="10" fill="#64748b">USB 5V</text>

  <!-- ===================== ESP32 ===================== -->
  <rect x="70" y="330" width="190" height="120" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="165" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">ESP32-S3-N16R8</text>
  <text x="165" y="383" text-anchor="middle" font-size="11" fill="#475569">Firmware MQTT</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="#64748b">5V/VIN</text>
  <text x="246" y="345" text-anchor="end" font-size="10" font-weight="700" fill="#2563eb">GPIO4</text>
  <text x="150" y="444" text-anchor="middle" font-size="10" fill="#64748b">GND</text>

  <!-- USB Pi -> ESP32 -->
  <line x1="150" y1="270" x2="150" y2="330" stroke="#334155" stroke-width="2.5"/>
  <text x="158" y="304" font-size="10" fill="#475569">USB (5V + GND compartilhado)</text>

  <!-- ESP32 GND -> trilho -->
  <line x1="150" y1="450" x2="150" y2="590" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="150" cy="590" r="4" fill="#0f172a"/>

  <!-- ===================== GPIO4 -> R220 -> PC817 ===================== -->
  <line x1="260" y1="350" x2="297" y2="350" stroke="#334155" stroke-width="2.5"/>
  <rect x="297" y="341" width="56" height="18" rx="3" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="325" y="334" text-anchor="middle" font-size="11" fill="#334155">R 220 Ω</text>
  <line x1="353" y1="350" x2="390" y2="350" stroke="#334155" stroke-width="2.5"/>

  <!-- ===================== PC817 ===================== -->
  <rect x="390" y="320" width="120" height="100" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="450" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">PC817</text>
  <text x="450" y="438" text-anchor="middle" font-size="10" fill="#64748b">opto-isolador (3,3V ⟂ 12V)</text>
  <!-- isolacao -->
  <line x1="450" y1="328" x2="450" y2="412" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <!-- LED interno (lado esquerdo) -->
  <polygon points="412,360 412,378 426,369" fill="#1e293b"/>
  <line x1="426" y1="358" x2="426" y2="380" stroke="#1e293b" stroke-width="2"/>
  <line x1="430" y1="352" x2="436" y2="346" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="434" y1="356" x2="440" y2="350" stroke="#1e293b" stroke-width="1.5"/>
  <!-- fototransistor (lado direito) -->
  <circle cx="478" cy="369" r="13" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="468" y1="369" x2="475" y2="369" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="475" y1="360" x2="485" y2="356" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="475" y1="378" x2="485" y2="382" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="462" y1="357" x2="468" y2="363" stroke="#1e293b" stroke-width="1.2"/>
  <line x1="460" y1="361" x2="466" y2="367" stroke="#1e293b" stroke-width="1.2"/>

  <!-- pinos PC817 -->
  <text x="386" y="346" text-anchor="end" font-size="9" fill="#64748b">A (1)</text>
  <text x="386" y="392" text-anchor="end" font-size="9" fill="#64748b">K (2)</text>
  <text x="514" y="346" font-size="9" fill="#64748b">C (4)</text>
  <text x="514" y="392" font-size="9" fill="#64748b">E (3)</text>

  <!-- pin1 anodo <- R220 (ja conectado acima em 390,350) -->
  <circle cx="390" cy="350" r="3.5" fill="#334155"/>
  <!-- pin2 catodo -> GND -->
  <line x1="390" y1="385" x2="390" y2="590" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="390" cy="590" r="4" fill="#0f172a"/>
  <!-- pin4 coletor -> +12V -->
  <line x1="510" y1="350" x2="510" y2="95" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="510" cy="95" r="4" fill="#dc2626"/>
  <!-- pin3 emissor -> gate -->
  <line x1="510" y1="385" x2="635" y2="385" stroke="#334155" stroke-width="2.5"/>

  <!-- ===================== R10k pull-down do gate ===================== -->
  <circle cx="560" cy="385" r="3.5" fill="#334155"/>
  <line x1="560" y1="385" x2="560" y2="452" stroke="#334155" stroke-width="2.5"/>
  <rect x="551" y="452" width="18" height="56" rx="3" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="575" y="484" font-size="11" fill="#334155">10 kΩ</text>
  <text x="575" y="498" font-size="9" fill="#64748b">(pull-down)</text>
  <line x1="560" y1="508" x2="560" y2="590" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="560" cy="590" r="4" fill="#0f172a"/>

  <!-- ===================== IRF540N ===================== -->
  <rect x="635" y="335" width="125" height="115" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
  <text x="697" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">IRF540N</text>
  <text x="697" y="406" text-anchor="middle" font-size="10" fill="#475569">MOSFET canal-N</text>
  <text x="643" y="380" font-size="11" font-weight="700" fill="#0f172a">G</text>
  <text x="705" y="352" font-size="11" font-weight="700" fill="#0f172a">D</text>
  <text x="705" y="446" font-size="11" font-weight="700" fill="#0f172a">S</text>

  <!-- gate stub (ligado ao emissor em 635,385) -->
  <circle cx="635" cy="385" r="3.5" fill="#334155"/>
  <!-- source -> GND -->
  <line x1="697" y1="450" x2="697" y2="590" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="697" cy="590" r="4" fill="#0f172a"/>
  <!-- drain -> no N_drain -->
  <line x1="697" y1="335" x2="697" y2="205" stroke="#334155" stroke-width="2.5"/>

  <!-- ===================== LAMPADA ===================== -->
  <circle cx="590" cy="160" r="26" fill="#fffbeb" stroke="#1e293b" stroke-width="2"/>
  <line x1="572" y1="142" x2="608" y2="178" stroke="#1e293b" stroke-width="2"/>
  <line x1="572" y1="178" x2="608" y2="142" stroke="#1e293b" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Lâmpada</text>
  <text x="590" y="225" text-anchor="middle" font-size="11" fill="#475569">12V DC</text>
  <!-- lampada (+) -> +12V -->
  <line x1="590" y1="134" x2="590" y2="95" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="590" cy="95" r="4" fill="#dc2626"/>
  <text x="598" y="118" font-size="10" fill="#dc2626">(+)</text>
  <!-- lampada (-) -> N_drain -->
  <line x1="590" y1="186" x2="590" y2="205" stroke="#334155" stroke-width="2.5"/>
  <text x="598" y="200" font-size="10" fill="#475569">(−)</text>

  <!-- no N_drain (horizontal) -->
  <line x1="590" y1="205" x2="697" y2="205" stroke="#334155" stroke-width="2.5"/>
  <circle cx="680" cy="205" r="4" fill="#334155"/>

  <!-- ===================== 1N4007 (flyback) ===================== -->
  <!-- catodo (barra) ligado ao +12V em cima, anodo no N_drain embaixo -->
  <line x1="680" y1="95" x2="680" y2="118" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="668" y1="118" x2="692" y2="118" stroke="#1e293b" stroke-width="2.5"/>
  <polygon points="668,150 692,150 680,120" fill="#1e293b"/>
  <line x1="680" y1="150" x2="680" y2="205" stroke="#334155" stroke-width="2.5"/>
  <text x="700" y="138" font-size="11" font-weight="700" fill="#0f172a">1N4007</text>
  <text x="700" y="152" font-size="9" fill="#64748b">(flyback)</text>
  <text x="654" y="113" text-anchor="end" font-size="9" fill="#64748b">K</text>

  <!-- ===================== FONTE 12V (bateria) ===================== -->
  <line x1="880" y1="95" x2="880" y2="290" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="868" y1="290" x2="892" y2="290" stroke="#0f172a" stroke-width="3"/>
  <line x1="873" y1="302" x2="887" y2="302" stroke="#0f172a" stroke-width="3"/>
  <line x1="868" y1="314" x2="892" y2="314" stroke="#0f172a" stroke-width="3"/>
  <line x1="873" y1="326" x2="887" y2="326" stroke="#0f172a" stroke-width="3"/>
  <line x1="880" y1="326" x2="880" y2="590" stroke="#0f172a" stroke-width="2.5"/>
  <circle cx="880" cy="590" r="4" fill="#0f172a"/>
  <text x="898" y="284" font-size="13" font-weight="700" fill="#dc2626">+</text>
  <text x="898" y="332" font-size="14" font-weight="700" fill="#0f172a">−</text>
  <text x="876" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Fonte 12V DC</text>

  <!-- ===================== LEGENDA ===================== -->
  <line x1="40" y1="630" x2="900" y2="630" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="40" y="652" font-size="11" fill="#334155">• Chaveamento <tspan font-weight="700">low-side</tspan>: o IRF540N corta o GND da lâmpada (não é relé — sem COM/NO/NC).</text>
  <text x="40" y="671" font-size="11" fill="#334155">• <tspan font-weight="700">GPIO4 HIGH</tspan> → opto conduz → gate em ~12V → MOSFET satura → lâmpada acende  (firmware: <tspan font-family="monospace">LED_ATIVO_ALTO = true</tspan>).</text>
  <text x="40" y="690" font-size="11" fill="#334155">• O <tspan font-weight="700">PC817</tspan> isola o GPIO de 3,3V do gate de 12V — essencial porque o IRF540N não é logic-level.</text>
  <text x="40" y="709" font-size="11" fill="#334155">• <tspan font-weight="700">GND comum</tspan> obrigatório (ESP32 via USB da Pi + fonte 12V).  Dica: energizar a fonte de 12V por último.</text>
</svg>
