# Render Blueprint — backend FastAPI + Socket.IO (tpe).
# Importe em https://dashboard.render.com/blueprints (New > Blueprint) apontando
# para este repositório. O Render builda o Dockerfile de code/backend.
#
# Variáveis sem `value`/`generateValue` (sync: false) você preenche no painel
# após o primeiro deploy: DATABASE_URL, RPI_DEVICE_TOKEN, ALLOWED_ORIGINS.
services:
  - type: web
    name: tpe-backend
    runtime: docker
    rootDir: code/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # Gerado automaticamente pelo Render (assinatura dos JWT do backend).
      - key: SECRET_KEY
        generateValue: true
      # PostgreSQL (Neon/Supabase free). No Neon, inclua ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      # Token que o dispositivo RPi usa para conectar no Socket.IO.
      - key: RPI_DEVICE_TOKEN
        sync: false
      # CORS: inclua a URL do frontend na Vercel, separada por vírgula.
      - key: ALLOWED_ORIGINS
        sync: false
